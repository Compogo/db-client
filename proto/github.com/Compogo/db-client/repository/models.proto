syntax = "proto3";

package compogo.database.repository;

option go_package = "github.com/Compogo/db-client/protobuf/repository";

import "github.com/Compogo/db-client/repository/comparable.proto";
import "github.com/Compogo/db-client/repository/sort_direction.proto";

message Page {
  uint64 Number = 1;
  uint32 Limit = 2;
}

message Sort {
  string ColumnName = 1;
  SortDirection Direction = 2;
}

message Filter {
  string ColumnName = 1;
  string Value = 2;
  Comparable Comparable = 3;
}

message Request {
  Page Page = 1;
  repeated Sort Sorts = 2;
  repeated Filter Filters = 3;
}
